<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Menu - SmartCafé AI Ordering</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Header Navigation (Injected dynamically by app.js) -->
    <header></header>

    <main class="container section">
        
        <!-- Table Detection Header -->
        <div id="table-display-header" class="table-assignment" style="display: none; margin-bottom: 30px;">
            <i data-lucide="info" style="vertical-align: middle; margin-right: 5px; color: var(--accent-gold);"></i> 
            Logged in via QR Code: Ordering for <strong id="active-table-num">Table 5</strong>
        </div>

        <div class="section-title">
            <h2>Our Smart Menu</h2>
            <p>Select your favorite items. Our smart engine highlights tailored pairings just for you.</p>
        </div>

        <!-- AI Recommendation Section -->
        <div class="recommendations-section">
            <div class="ai-recommendation-banner">
                <div class="ai-banner-content">
                    <h3><i data-lucide="sparkles"></i> AI Smart Pairings</h3>
                    <p>Suggested by our artificial barista based on the time of day, popular pairings, and current mood.</p>
                </div>
            </div>
            <div class="recommendations-grid" id="ai-recommendations-container">
                <!-- AI recommendations loaded here -->
            </div>
        </div>

        <hr style="border: 0; height: 1px; background: var(--card-border); margin: 40px 0;">

        <!-- Menu Layout (Sidebar Filter + Main Grid) -->
        <div class="menu-layout">
            <!-- Sidebar Filter -->
            <aside class="menu-sidebar glass-card">
                <div class="filter-search">
                    <i data-lucide="search"></i>
                    <input type="text" id="menu-search-input" placeholder="Search menu...">
                </div>
                
                <h4 style="margin-bottom: 15px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; color: var(--text-secondary);">Categories</h4>
                <ul class="filter-categories">
                    <li><button class="filter-btn active" data-category="all"><i data-lucide="layout-grid"></i> All Items</button></li>
                    <li><button class="filter-btn" data-category="coffee"><i data-lucide="coffee"></i> Coffee</button></li>
                    <li><button class="filter-btn" data-category="tea"><i data-lucide="cup-soda"></i> Tea & Tonics</button></li>
                    <li><button class="filter-btn" data-category="snacks"><i data-lucide="sandwich"></i> Savories</button></li>
                    <li><button class="filter-btn" data-category="desserts"><i data-lucide="cake"></i> Patisserie</button></li>
                </ul>
            </aside>

            <!-- Main Items List -->
            <section class="menu-items-section">
                <div class="menu-items-grid" id="menu-items-container">
                    <!-- Menu Cards loaded here -->
                </div>
            </section>
        </div>

    </main>

    <!-- Footer (Injected dynamically by app.js) -->
    <footer></footer>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/cart.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check for Table parameters in query string or session storage
            const urlParams = new URLSearchParams(window.location.search);
            let table = urlParams.get('table');
            
            if (!table) {
                table = sessionStorage.getItem('scanned_table');
            } else {
                sessionStorage.setItem('scanned_table', table);
            }

            if (table) {
                const tableHeader = document.getElementById('table-display-header');
                const tableText = document.getElementById('active-table-num');
                if (tableHeader && tableText) {
                    tableText.textContent = `Table ${table}`;
                    tableHeader.style.display = 'block';
                }
            }

            // Render Page elements
            renderMenuGrid();
            renderAIRecommendations();
            setupFilters();
        });

        // 1. Render Menu Grid
        function renderMenuGrid(category = 'all', searchQuery = '') {
            const db = AppDB.get();
            const container = document.getElementById('menu-items-container');
            if (!container) return;

            container.innerHTML = '';
            let items = db.menu || [];

            // Apply Filters
            if (category !== 'all') {
                items = items.filter(i => i.category === category);
            }
            if (searchQuery.trim() !== '') {
                const q = searchQuery.toLowerCase();
                items = items.filter(i => i.name.toLowerCase().includes(q) || i.description.toLowerCase().includes(q));
            }

            if (items.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;"><i data-lucide="frown" style="width: 48px; height: 48px; margin-bottom: 12px;"></i><p>No items match your criteria.</p></div>`;
                if (window.lucide) lucide.createIcons();
                return;
            }

            items.forEach(item => {
                const card = document.createElement('article');
                card.className = 'product-card glass-card';
                
                // Check popular badge
                const popBadge = item.isPopular ? `<span class="badge" style="position: absolute; top: 12px; left: 12px; z-index: 10;">Signature</span>` : '';
                // Check stock levels
                const stock = db.inventory[item.id] !== undefined ? db.inventory[item.id] : 10;
                const stockBadge = stock <= 0 ? `<span class="badge badge-red" style="position: absolute; top: 12px; right: 12px; z-index: 10;">Out of Stock</span>` : '';
                const btnState = stock <= 0 ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : '';

                card.innerHTML = `
                    <div class="product-img-container" style="position: relative;">
                        ${popBadge}
                        ${stockBadge}
                        <img class="product-img" src="${item.image}" alt="${item.name}">
                    </div>
                    <h3 class="product-name">${item.name}</h3>
                    <p class="product-desc">${item.description}</p>
                    <div class="product-footer">
                        <span class="product-price">$${item.price.toFixed(2)}</span>
                        <button class="btn btn-primary" onclick="Cart.add('${item.id}', 1)" ${btnState}>
                            <i data-lucide="shopping-cart"></i> Add
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            if (window.lucide) lucide.createIcons();
        }

        // 2. Render AI Recommended Items
        function renderAIRecommendations() {
            const db = AppDB.get();
            const container = document.getElementById('ai-recommendations-container');
            if (!container) return;

            container.innerHTML = '';
            
            // Get recommendations based on current cart
            const recommendations = AI.getMenuRecommendations(db.cart || []);
            
            recommendations.forEach(item => {
                const card = document.createElement('div');
                card.className = 'product-card glass-card';
                card.style.border = '1px solid rgba(212, 175, 55, 0.3)';
                
                const stock = db.inventory[item.id] !== undefined ? db.inventory[item.id] : 10;
                const btnState = stock <= 0 ? 'disabled' : '';

                card.innerHTML = `
                    <div class="badge badge-green" style="margin-bottom: 12px; align-self: flex-start; text-transform: none;">
                        <i data-lucide="sparkles" style="width: 12px; height: 12px; margin-right: 4px;"></i> ${item.aiReason}
                    </div>
                    <h4 style="font-size: 1.15rem; margin-bottom: 6px;">${item.name}</h4>
                    <p class="product-desc" style="font-size: 0.85rem; margin-bottom: 15px;">${item.description}</p>
                    <div class="product-footer">
                        <span class="product-price" style="font-size: 1rem;">$${item.price.toFixed(2)}</span>
                        <button class="btn btn-primary" onclick="Cart.add('${item.id}', 1)" ${btnState}>
                            <i data-lucide="plus"></i> Pair
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            if (window.lucide) lucide.createIcons();
        }

        // 3. Setup filters and search inputs
        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    const target = e.currentTarget;
                    target.classList.add('active');
                    
                    const cat = target.getAttribute('data-category');
                    const q = document.getElementById('menu-search-input').value;
                    renderMenuGrid(cat, q);
                });
            });

            const searchInput = document.getElementById('menu-search-input');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const activeCatBtn = document.querySelector('.filter-btn.active');
                    const cat = activeCatBtn ? activeCatBtn.getAttribute('data-category') : 'all';
                    renderMenuGrid(cat, e.target.value);
                });
            }
        }
    </script>
</body>
</html>
